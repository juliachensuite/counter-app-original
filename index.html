<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Counter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      background: #0f766e;   /* teal */
      color: #fff;
      overflow-x: hidden;    /* never scroll sideways */
    }

    /* 2x2 grid of count cards */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    /* With a single counter left, let it fill the screen. */
    .grid.solo {
      grid-template-columns: 1fr;
      max-width: none;
    }
    .grid.solo .card {
      min-height: calc(100dvh - 40px);
      border-radius: 0;
      background: transparent;
    }
    /* Scale the lone number to fill the screen. */
    .grid.solo .count { font-size: min(42vw, 38vh); }

    /* With two counters, stack them top and bottom, each filling half the screen. */
    .grid.duo {
      grid-template-columns: 1fr;
      max-width: none;
    }
    .grid.duo .card { min-height: calc(50dvh - 30px); }
    .grid.duo .count { font-size: min(30vw, 20vh); }

    /* 3-4 counters (2x2 grid) and 5-6 counters (2x3 grid) get smaller numbers. */
    .grid.quad .count { font-size: min(20vw, 17vh); }
    .grid.hex .count { font-size: min(16vw, 12vh); }
    .card {
      position: relative;
      min-width: 0;   /* let cards shrink so the grid never overflows sideways */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.15);
    }

    /* Small "remove this counter" button in the card corner. */
    .remove {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 16px;
      line-height: 1;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.25);
    }
    .remove:hover { background: rgba(0, 0, 0, 0.45); }

    /* Click the title to edit it in place */
    .title {
      font-size: 20px;
      font-weight: 600;
      opacity: 0.85;
      text-align: center;
      min-width: 40px;
      padding: 4px 8px;
      border-radius: 8px;
      outline: none;
      cursor: text;
    }
    .title:hover { background: rgba(255, 255, 255, 0.1); }
    .title:focus { background: rgba(255, 255, 255, 0.2); opacity: 1; }

    .count { font-weight: bold; line-height: 1; font-size: min(18vw, 16vh); }

    /* Two rows of controls: the +/- row on top, Reset underneath.
       Extra gap keeps Reset well clear of the +/- buttons. */
    .buttons { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .buttons-row { display: flex; align-items: center; gap: 8px; }
    /* Top row spreads −1 / + / +5 across the width so they're well separated
       (and adapts to the card width instead of overflowing). */
    .buttons-row.top {
      width: 100%;
      max-width: 280px;
      gap: 16px;
      justify-content: space-between;
    }
    button {
      font-size: 28px;
      padding: 12px 20px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: #0f3460;
      color: #fff;
    }
    button:hover { background: #16529e; }

    /* The large primary +1 button in the middle — the main action.
       Bigger, brighter, and circular so it clearly stands out from the sides. */
    .btn-big {
      font-size: 64px;
      width: 120px;
      height: 120px;
      padding: 0;
      border-radius: 50%;
      background: #2563eb;
    }
    .btn-big:hover { background: #3b82f6; }

    /* The side +5 / −1 buttons: smaller and more muted secondary actions. */
    .btn-side {
      font-size: 20px;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.25);
    }
    .btn-side:hover { background: rgba(0, 0, 0, 0.4); }

    /* The smaller reset button on the bottom row. */
    .btn-reset { font-size: 16px; padding: 8px 18px; opacity: 0.85; }

    #add { margin-top: 24px; font-size: 18px; }
    #add:disabled { opacity: 0.4; cursor: default; }
    #add:disabled:hover { background: #0f3460; }

    /* Keep the 2x2 grid and buttons from overflowing on phone screens */
    @media (max-width: 600px) {
      body { padding: 12px; justify-content: flex-start; }
      .grid { gap: 10px; }
      .card { padding: 12px; gap: 10px; border-radius: 18px; }
      .grid.solo .card { min-height: calc(100dvh - 24px); }
      .grid.duo .card { min-height: calc(50dvh - 17px); }
      .title { font-size: 16px; }
      .buttons { gap: 16px; }
      .buttons-row { gap: 6px; }
      /* Sized so −1 + big + +5 fit within a half-width column without overflow. */
      .btn-big { width: 68px; height: 68px; font-size: 38px; }
      .btn-side { font-size: 15px; padding: 8px 9px; }
      .btn-reset { font-size: 14px; padding: 6px 14px; }
      .remove { font-size: 15px; padding: 3px 8px; }
    }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <button id="add">+ Add counter</button>
  <script>
    const MIN_COUNTS = 1;
    const MAX_COUNTS = 6;
    const DEFAULT_COUNTS = 4;
    const grid = document.getElementById("grid");
    const addBtn = document.getElementById("add");

    // Load saved state, or fall back to defaults if nothing is saved yet.
    // Each count has a value and a title.
    let counts = JSON.parse(localStorage.getItem("counts")) || [];
    let titles = JSON.parse(localStorage.getItem("titles")) || [];

    // Migrate the old single-counter save into the first slot, if present.
    const oldCount = localStorage.getItem("count");
    if (counts.length === 0 && oldCount !== null) counts[0] = Number(oldCount);

    // How many counters to show. Derived from saved data on first load,
    // then tracked explicitly as the user adds/removes counters.
    let numCounts = Number(localStorage.getItem("numCounts")) ||
                    counts.length || DEFAULT_COUNTS;
    numCounts = Math.min(MAX_COUNTS, Math.max(MIN_COUNTS, numCounts));

    // Ensure every visible slot has a value and a title.
    for (let i = 0; i < numCounts; i++) {
      if (typeof counts[i] !== "number") counts[i] = 0;
      if (typeof titles[i] !== "string") titles[i] = "Count " + (i + 1);
    }

    function save() {
      localStorage.setItem("counts", JSON.stringify(counts));
      localStorage.setItem("titles", JSON.stringify(titles));
      localStorage.setItem("numCounts", numCounts);
    }

    function change(i, amount) {
      counts[i] += amount;
      render();
      save();
    }

    function reset(i) {
      // Confirm before zeroing so a stray tap doesn't wipe the count.
      if (!confirm("Reset \"" + titles[i] + "\" to 0?")) return;
      counts[i] = 0;
      render();
      save();
    }

    function addCounter() {
      if (numCounts >= MAX_COUNTS) return;
      const i = numCounts;
      counts[i] = 0;
      titles[i] = "Count " + (i + 1);
      numCounts++;
      render();
      save();
    }

    function removeCounter(i) {
      if (numCounts <= MIN_COUNTS) return;
      counts.splice(i, 1);
      titles.splice(i, 1);
      numCounts--;
      render();
      save();
    }

    // Build all visible cards from the current state.
    function render() {
      grid.innerHTML = "";
      // Pick a layout so the numbers auto-scale to the number of counters.
      const mode = numCounts === 1 ? "solo"
                 : numCounts === 2 ? "duo"
                 : numCounts <= 4 ? "quad"
                 : "hex";
      grid.className = "grid " + mode;
      addBtn.disabled = numCounts >= MAX_COUNTS;
      for (let i = 0; i < numCounts; i++) {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "title";
        title.contentEditable = "true";
        title.textContent = titles[i];
        title.addEventListener("blur", () => {
          titles[i] = title.textContent.trim() || "Count " + (i + 1);
          title.textContent = titles[i];
          save();
        });
        // Enter confirms the edit instead of adding a newline.
        title.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); title.blur(); }
        });

        const count = document.createElement("div");
        count.className = "count";
        count.textContent = counts[i];

        const buttons = document.createElement("div");
        buttons.className = "buttons";

        // Top row: −1 on the left, big +1 in the middle, +5 on the right.
        const topRow = document.createElement("div");
        topRow.className = "buttons-row top";
        const minus = document.createElement("button");
        minus.className = "btn-side";
        minus.textContent = "−1";
        minus.onclick = () => change(i, -1);
        const plus = document.createElement("button");
        plus.className = "btn-big";
        plus.textContent = "+";
        plus.onclick = () => change(i, 1);
        const plus5 = document.createElement("button");
        plus5.className = "btn-side";
        plus5.textContent = "+5";
        plus5.onclick = () => change(i, 5);
        topRow.append(minus, plus, plus5);

        // Bottom row: smaller reset button.
        const bottomRow = document.createElement("div");
        bottomRow.className = "buttons-row";
        const resetBtn = document.createElement("button");
        resetBtn.className = "btn-reset";
        resetBtn.textContent = "Reset";
        resetBtn.onclick = () => reset(i);
        bottomRow.append(resetBtn);

        buttons.append(topRow, bottomRow);

        card.append(title, count, buttons);

        // Only offer removal when there's more than one counter left.
        if (numCounts > MIN_COUNTS) {
          const remove = document.createElement("button");
          remove.className = "remove";
          remove.textContent = "×";
          remove.title = "Remove counter";
          remove.onclick = () => removeCounter(i);
          card.append(remove);
        }

        grid.append(card);
      }
    }

    addBtn.onclick = addCounter;

    render();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
